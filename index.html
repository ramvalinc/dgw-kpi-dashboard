// ── SETUP SCREEN ──
function SetupScreen() {
  const [url, setUrl] = useState('');
  const [testing, setTesting] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);

  const testAndSave = async () => {
    if (!url.trim()) { setError('Please paste the URL'); return; }
    setTesting(true); setError('');
    try {
      const r = await fetch(url.trim() + '?action=ping');
      const d = await r.json();
      if (d.status === 'ok') {
        localStorage.setItem(URL_KEY, url.trim());
        setSuccess(true);
        setTimeout(() => window.location.reload(), 1000);
      } else {
        setError('Connected but got unexpected response. Check your Apps Script.');
      }
    } catch(e) {
      // no-cors mode won't let us read response, try saving URL anyway
      localStorage.setItem(URL_KEY, url.trim());
      setSuccess(true);
      setTimeout(() => window.location.reload(), 1000);
    }
    setTesting(false);
  };

  return (
    <div className="setup-container">
      <div className="setup-box">
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:48}}>&#128054;</div>
          <h1>Doggies Gone Wild</h1>
          <p style={{color:'#f0f4f8',fontSize:16,margin:'4px 0 0'}}>KPI Dashboard — First Time Setup</p>
        </div>
        <p>Connect to your Google Sheet to share data across all devices and staff. Follow these steps:</p>

        <div className="step">
          <span className="step-num">1</span>
          <span className="step-text">Open <b>Google Sheets</b> and create a new blank spreadsheet</span>
        </div>
        <div className="step">
          <span className="step-num">2</span>
          <span className="step-text">Go to <b>Extensions → Apps Script</b></span>
        </div>
        <div className="step">
          <span className="step-num">3</span>
          <span className="step-text">Delete the existing code. Paste the Apps Script code (provided separately)</span>
        </div>
        <div className="step">
          <span className="step-num">4</span>
          <span className="step-text">Click <b>Deploy → New deployment → Web app</b></span>
        </div>
        <div className="step">
          <span className="step-num">5</span>
          <span className="step-text">Set <b>"Execute as: Me"</b> and <b>"Who has access: Anyone"</b> → Deploy</span>
        </div>
        <div className="step">
          <span className="step-num">6</span>
          <span className="step-text">Copy the <b>Web App URL</b> and paste it below</span>
        </div>

        <div style={{marginTop:20}}>
          <input type="text" value={url} onChange={e => setUrl(e.target.value)}
            placeholder="Paste your Google Apps Script Web App URL here..."
            onKeyDown={e => e.key === 'Enter' && testAndSave()} />
          {error && <div style={{color:'#ff6b6b',fontSize:13,marginBottom:8}}>{error}</div>}
          {success && <div style={{color:'#4caf50',fontSize:13,marginBottom:8}}>Connected! Loading dashboard...</div>}
          <button onClick={testAndSave} disabled={testing}>
            {testing ? 'Connecting...' : 'Connect & Launch Dashboard'}
          </button>
          <div className="warn">Each staff member only needs to do this once on their device. The URL is saved in the browser.</div>
        </div>
      </div>
    </div>
  );
}

// ── SYNC BADGE ──
function SyncBadge({saving}) {
  const [show, setShow] = useState(false);
  const resetSetup = () => { if(confirm('This will disconnect from Google Sheets. You will need to enter the URL again. Continue?')) { localStorage.removeItem(URL_KEY); window.location.reload(); } };
  return (
    <div className="sync-badge">
      <div className={'sync-dot ' + (saving ? 'saving' : 'ok')}></div>
      {saving ? 'Syncing...' : 'Connected to Google Sheets'}
      <span onClick={resetSetup} className="reset-link" style={{marginTop:0,marginLeft:8}}>Reset</span>
    </div>
  );
}

  const save=useCallback(async(nd,nf)=>{setSv(true);const d=nd!==undefined?nd:aD;const f=nf!==undefined?nf:fE;if(nd!==undefined)setAD(d);if(nf!==undefined)setFE(f);const payload={days:d,fixed:f};localStorage.setItem(SK,JSON.stringify(payload));try{const url=localStorage.getItem(URL_KEY);if(url){await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'write',data:payload})});}}catch(e){console.log('Sync error',e);}setSv(false);},[aD,fE]);
  const dk=`${mo}-${String(dy).padStart(2,'0')}`;const dd=aD[dk]||eD();const gMF=useCallback(m=>fE[m]||dF(),[fE]);

  const mDt=useMemo(()=>{const mf=gMF(mo);let dc=0,bd=0,gr=0;Object.entries(FA).forEach(([k,a])=>{const v=(mf[k]||0)/dim;dc+=v*a.dc;bd+=v*a.bd;gr+=v*a.gr;});const fd={dc,bd,gr};return Array.from({length:dim},(_,i)=>{const k2=`${mo}-${String(i+1).padStart(2,'0')}`;const m=cc(aD[k2],fd);return {day:i+1,...(m||{dcDogs:0,dcRev:0,bdDogs:0,bdRev:0,grDogs:0,grRev:0,gxRev:0,sbDogs:0,sbRev:0,sxRev:0,totalHrs:0,laborCost:0,totalRev:0,totalCost:0,totalDogs:0,profit:0,retailNet:0,vetDC:0,vetBD:0,vetGR:0,refunds:0,discounts:0,calls:0,callsBooked:0,tours:0,toursBooked:0,compDC:0,compBD:0,compGR:0,fights:0,star1:0,star2:0,star3:0,star4:0,star5:0,fixedDC:0,fixedBD:0,fixedGR:0})};});},[aD,mo,dim,gMF]);

  const cP=useMemo(()=>{let c=0;return mDt.map(d=>{c+=d.profit;return {day:d.day,cum:c};});},[mDt]);
  const aDs=mDt.filter(d=>d.totalRev!==0||d.totalDogs>0||d.laborCost>0);

    </>)}
    {vw==='staffing'&&(!sOK?<Lock onUnlock={()=>setSOK(true)} label="Staffing — Protected"/>:(<><DSel/><h2 style={{fontSize:18,fontWeight:800,margin:'0 0 14px'}}>{mL} — Day {dy} — Staffing</h2><CB><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>{[['pp','Play Pen (PP)'],['bp','Back Pack (BP)'],['hotel','Hotel'],['reception','Reception'],['bather','Bather'],['rate','Hourly Rate ($)']].map(([k,l])=>(<NI key={k} label={l} value={dd.labor?.[k]} step={k==='rate'?.5:.01} onChange={v=>uL(k,v)} prefix={k==='rate'?'$':null}/>))}</div>{tm&&<div style={{marginTop:14,display:'flex',gap:20,fontSize:13,color:C.muted}}><span>Total Hours: <b style={{color:C.white}}>{tm.totalHrs.toFixed(1)}</b></span><span>Labor Cost: <b style={{color:C.coral}}>{fmt2(tm.laborCost)}</b></span></div>}</CB><CB title="Monthly Staff Hours" style={{marginTop:16}}><ResponsiveContainer width="100%" height={260}><BarChart data={mDt.filter(d=>d.totalHrs>0)}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="day" stroke={C.muted} fontSize={11}/><YAxis stroke={C.muted} fontSize={11}/><Tooltip content={CT}/><Bar dataKey="totalHrs" name="Hours" fill={C.sky} radius={[4,4,0,0]}/></BarChart></ResponsiveContainer></CB></>))}
    {vw==='expenses'&&(!sOK?<Lock onUnlock={()=>setSOK(true)} label="Fixed Expenses — Protected"/>:(<><h2 style={{fontSize:18,fontWeight:800,margin:'0 0 14px'}}>{mL} — Monthly Fixed Expenses</h2><CB><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>{Object.entries(FA).map(([k,a])=>(<div key={k}><label style={{fontSize:12,color:C.muted,display:'block',marginBottom:3}}>{a.label}<span style={{fontSize:10,color:C.border,marginLeft:6}}>DC {(a.dc*100).toFixed(0)}% / BD {(a.bd*100).toFixed(0)}% / GR {(a.gr*100).toFixed(0)}%</span></label><div style={{display:'flex',alignItems:'center',gap:4}}><span style={{color:C.muted,fontSize:13,fontWeight:700}}>$</span><input type="number" min="0" value={gMF(mo)[k]||''} placeholder="0" onChange={e=>uFx(k,parseFloat(e.target.value)||0)} style={{width:'100%',background:C.input,border:`1px solid ${C.border}`,borderRadius:8,color:C.white,padding:'8px 12px',fontSize:14,outline:'none',boxSizing:'border-box'}} onFocus={e=>e.target.style.borderColor=C.teal} onBlur={e=>e.target.style.borderColor=C.border}/></div></div>))}</div><div style={{marginTop:20,borderTop:`1px solid ${C.border}`,paddingTop:14}}><div style={{fontSize:13,fontWeight:700,color:C.white,marginBottom:8}}>Monthly Allocation Summary</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>{[['Daycare','dc',C.sky],['Boarding','bd',C.teal],['Grooming','gr',C.purple]].map(([l,key,clr])=>{const mf=gMF(mo);const total=Object.entries(FA).reduce((a,[k,al])=>a+(mf[k]||0)*al[key],0);return <div key={key} style={{background:C.navy,borderRadius:10,padding:12,textAlign:'center'}}><div style={{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:1}}>{l}</div><div style={{fontSize:22,fontWeight:800,color:clr}}>{fmt(total)}</div><div style={{fontSize:11,color:C.muted}}>{fmt2(total/dim)}/day</div></div>;})}</div></div></CB></>))}
    {vw==='dashboard'&&(!dOK?<Lock onUnlock={()=>setDOK(true)} label="Dashboard — Owner Access"/>:(<><h2 style={{fontSize:18,fontWeight:800,margin:'0 0 14px'}}>{mL} — Dashboard</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:10,marginBottom:20}}><KP label="Total Revenue" value={fmt(mt.rev)} sub={`${mt.days} days`}/><KP label="Total Costs" value={fmt(mt.totalCost)} color={C.coral} sub={`Labor ${fmt(mt.labor)} + Fixed ${fmt(mt.fixedTotal)}`}/><KP label="Gross Profit" value={fmt(mt.profit)} color={mt.profit>=0?C.green:C.coral} sub={mt.rev?pct(mt.profit/mt.rev)+' margin':''}/><KP label="Avg Daily Rev" value={mt.days?fmt(mt.rev/mt.days):'—'} color={C.sky}/><KP label="Total Dogs" value={mt.dogs} color={C.amber} sub={mt.days?`${(mt.dogs/mt.days).toFixed(0)}/day`:''}/><KP label="Retail (Net)" value={fmt2(mt.retailNet)} color={C.pink}/><KP label="Refunds" value={fmt2(mt.refunds)} color={C.coral}/><KP label="Discounts" value={fmt2(mt.discounts)} color={C.orange}/></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:10,marginBottom:20}}><KP label="New Client Calls" value={mt.calls} color={C.sky} sub={`${mt.callsBooked} booked`}/><KP label="Call Conversion" value={mt.calls?pct(mt.callsBooked/mt.calls):'—'} color={C.teal}/><KP label="New Client Tours" value={mt.tours} color={C.purple} sub={`${mt.toursBooked} booked`}/><KP label="Tour Conversion" value={mt.tours?pct(mt.toursBooked/mt.tours):'—'} color={C.teal}/><KP label="Total New Clients" value={mt.callsBooked+mt.toursBooked} color={C.green} sub={`From ${mt.calls+mt.tours} leads`}/><KP label="Total Reviews" value={mt.star1+mt.star2+mt.star3+mt.star4+mt.star5} color={C.amber} sub={`Avg ${(mt.star1+mt.star2+mt.star3+mt.star4+mt.star5)?(((mt.star1*1+mt.star2*2+mt.star3*3+mt.star4*4+mt.star5*5)/(mt.star1+mt.star2+mt.star3+mt.star4+mt.star5)).toFixed(1)):'0'} stars`}/><KP label="5-Star Reviews" value={mt.star5} color={C.green} sub={`${mt.star4} four-star`}/><KP label="1-2 Star Reviews" value={mt.star1+mt.star2} color={C.coral} sub={`${mt.star3} three-star`}/><KP label="Vet Expenses" value={fmt2(mt.vetTotal)} color={C.coral}/></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:10,marginBottom:20}}><KP label="Complaints (DC)" value={mt.compDC} color={C.coral} sub={mt.dogs?pct(mt.compDC/mt.dogs)+' of dogs':''}/><KP label="Complaints (BD)" value={mt.compBD} color={C.coral} sub={mt.dogs?pct(mt.compBD/mt.dogs)+' of dogs':''}/><KP label="Complaints (GR)" value={mt.compGR} color={C.coral} sub={mt.dogs?pct(mt.compGR/mt.dogs)+' of dogs':''}/><KP label="Total Complaints" value={mt.compDC+mt.compBD+mt.compGR} color={C.red} sub={mt.dogs?pct((mt.compDC+mt.compBD+mt.compGR)/mt.dogs)+' rate':''}/><KP label="Dog Fights" value={mt.fights} color={C.red} sub={mt.dogs?pct(mt.fights/mt.dogs)+' of total dogs':''}/></div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16,marginBottom:16}}><CB title="Daily Profit / Loss"><ResponsiveContainer width="100%" height={260}><ComposedChart data={aDs}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="day" stroke={C.muted} fontSize={11}/><YAxis stroke={C.muted} fontSize={11} tickFormatter={v=>'$'+v}/><Tooltip content={<CT/>}/><ReferenceLine y={0} stroke={C.muted} strokeDasharray="3 3"/><Bar dataKey="profit" name="Profit" radius={[4,4,0,0]}>{aDs.map((d,i)=><Cell key={i} fill={d.profit>=0?C.teal:C.coral} opacity={.85}/>)}</Bar></ComposedChart></ResponsiveContainer></CB><CB title="Revenue by Service"><ResponsiveContainer width="100%" height={260}><PieChart><Pie data={[{name:'Boarding',value:mt.bdRev},{name:'Daycare',value:mt.dcRev},{name:'Grooming',value:mt.grRev},{name:'Extras',value:mt.gxRev+mt.sxRev},{name:'Staff Bath',value:mt.sbRev},{name:'Retail',value:Math.max(0,mt.retailNet)}].filter(d=>d.value>0)} cx="50%" cy="50%" innerRadius={50} outerRadius={85} paddingAngle={3} dataKey="value">{PC.map((c,i)=><Cell key={i} fill={c}/>)}</Pie><Tooltip formatter={v=>fmt(v)}/><Legend wrapperStyle={{fontSize:11}}/></PieChart></ResponsiveContainer></CB></div>
      <CB title="Revenue vs Total Costs" style={{marginBottom:16}}><ResponsiveContainer width="100%" height={240}><LineChart data={aDs}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="day" stroke={C.muted} fontSize={11}/><YAxis stroke={C.muted} fontSize={11} tickFormatter={v=>'$'+v}/><Tooltip content={<CT/>}/><Legend wrapperStyle={{fontSize:11}}/><Line type="monotone" dataKey="totalRev" name="Revenue" stroke={C.teal} strokeWidth={2.5} dot={false}/><Line type="monotone" dataKey="totalCost" name="Costs" stroke={C.coral} strokeWidth={2} dot={false} strokeDasharray="5 3"/></LineChart></ResponsiveContainer></CB>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}><CB title="Cumulative Profit"><ResponsiveContainer width="100%" height={220}><AreaChart data={cP}><defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.teal} stopOpacity={.4}/><stop offset="100%" stopColor={C.teal} stopOpacity={0}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="day" stroke={C.muted} fontSize={11}/><YAxis stroke={C.muted} fontSize={11} tickFormatter={v=>'$'+v}/><Tooltip content={<CT/>}/><ReferenceLine y={0} stroke={C.coral} strokeDasharray="5 3"/><Area type="monotone" dataKey="cum" name="Cumulative" stroke={C.teal} fill="url(#cg)" strokeWidth={2.5}/></AreaChart></ResponsiveContainer></CB><CB title="Dog Count"><ResponsiveContainer width="100%" height={220}><BarChart data={aDs}><CartesianGrid strokeDasharray="3 3" stroke={C.border}/><XAxis dataKey="day" stroke={C.muted} fontSize={11}/><YAxis stroke={C.muted} fontSize={11}/><Tooltip content={<CT/>}/><Legend wrapperStyle={{fontSize:11}}/><Bar dataKey="dcDogs" name="Daycare" stackId="d" fill={C.sky}/><Bar dataKey="bdDogs" name="Boarding" stackId="d" fill={C.teal}/><Bar dataKey="grDogs" name="Grooming" stackId="d" fill={C.purple} radius={[4,4,0,0]}/></BarChart></ResponsiveContainer></CB></div>
      <CB title="Daily Log"><div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}><thead><tr>{['Day','Dogs','Rev','Labor','Fixed','Profit','Margin','Calls','Conv%','Tours','Conv%','Comp','Fights','F%','Avg★'].map(h=><th key={h} style={{padding:'6px 8px',textAlign:'right',color:C.muted,borderBottom:`1px solid ${C.border}`,fontSize:10,textTransform:'uppercase',letterSpacing:.5}}>{h}</th>)}</tr></thead><tbody>{aDs.map(d=>{const mg=d.totalRev?d.profit/d.totalRev:0;const comp=(d.compDC||0)+(d.compBD||0)+(d.compGR||0);return (<tr key={d.day} style={{borderBottom:`1px solid ${C.border}22`,cursor:'pointer'}} onClick={()=>{setDy(d.day);setVw('entry');}}><td style={{padding:'5px 8px',color:C.white,fontWeight:700}}>{d.day}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.amber}}>{d.totalDogs}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.white}}>{fmt(d.totalRev)}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.coral}}>{fmt(d.laborCost)}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.muted}}>{fmt((d.fixedDC||0)+(d.fixedBD||0)+(d.fixedGR||0))}</td><td style={{padding:'5px 8px',textAlign:'right',color:d.profit>=0?C.green:C.coral,fontWeight:700}}>{fmt(d.profit)}</td><td style={{padding:'5px 8px',textAlign:'right',color:mg>=.15?C.green:mg>=0?C.amber:C.coral}}>{d.totalRev?pct(mg):'—'}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.sky}}>{d.calls||''}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.teal}}>{d.calls?pct((d.callsBooked||0)/d.calls):''}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.purple}}>{d.tours||''}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.teal}}>{d.tours?pct((d.toursBooked||0)/d.tours):''}</td><td style={{padding:'5px 8px',textAlign:'right',color:comp?C.coral:C.muted}}>{comp||''}</td><td style={{padding:'5px 8px',textAlign:'right',color:d.fights?C.red:C.muted}}>{d.fights||''}</td><td style={{padding:'5px 8px',textAlign:'right',color:d.fights&&d.totalDogs?C.red:C.muted}}>{d.fights&&d.totalDogs?pct(d.fights/d.totalDogs):''}</td><td style={{padding:'5px 8px',textAlign:'right',color:C.amber}}>{(()=>{const tr=(d.star1||0)+(d.star2||0)+(d.star3||0)+(d.star4||0)+(d.star5||0);return tr?((d.star1*1+d.star2*2+d.star3*3+d.star4*4+d.star5*5)/tr).toFixed(1):'';})()}</td></tr>);})}</tbody><tfoot><tr style={{borderTop:`2px solid ${C.teal}`}}><td style={{padding:'6px 8px',fontWeight:800,color:C.teal}}>TOTAL</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.amber}}>{mt.dogs}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.white}}>{fmt(mt.rev)}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.coral}}>{fmt(mt.labor)}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.muted}}>{fmt(mt.fixedTotal)}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:800,color:mt.profit>=0?C.green:C.coral}}>{fmt(mt.profit)}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.teal}}>{mt.rev?pct(mt.profit/mt.rev):'—'}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.sky}}>{mt.calls}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.teal}}>{mt.calls?pct(mt.callsBooked/mt.calls):''}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.purple}}>{mt.tours}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.teal}}>{mt.tours?pct(mt.toursBooked/mt.tours):''}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.coral}}>{mt.compDC+mt.compBD+mt.compGR}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.red}}>{mt.fights}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.red}}>{mt.dogs?pct(mt.fights/mt.dogs):''}</td><td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:C.amber}}>{(()=>{const tr=mt.star1+mt.star2+mt.star3+mt.star4+mt.star5;return tr?((mt.star1*1+mt.star2*2+mt.star3*3+mt.star4*4+mt.star5*5)/tr).toFixed(1):'';})()}</td></tr></tfoot></table></div></CB>
    </>))}
    </div>
    <SyncBadge saving={sv}/>
  </div>);
}


// ── WRAPPER ──
function Wrapper() {
  const hasUrl = !!localStorage.getItem(URL_KEY);
  if (!hasUrl) return React.createElement(SetupScreen);
  return React.createElement(App);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Wrapper));
</script>
